<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="600" height="80">
  <!-- Step 1 -->
  <circle cx="100" cy="40" r="20" fill="#6366f1"/>
  <text x="100" y="46" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="600">1</text>
  <!-- Connector 1-2 -->
  <line x1="120" y1="40" x2="280" y2="40" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Step 2 -->
  <circle cx="300" cy="40" r="20" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="300" y="46" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16" font-weight="600">2</text>
  <!-- Connector 2-3 -->
  <line x1="320" y1="40" x2="480" y2="40" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Step 3 -->
  <circle cx="500" cy="40" r="20" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="500" y="46" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16" font-weight="600">3</text>
</svg>