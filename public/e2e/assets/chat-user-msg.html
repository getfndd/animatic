<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 0;
  }
  .bubble {
    background: oklch(88% 0.15 95);
    color: oklch(25% 0.02 70);
    padding: 14px 18px;
    border-radius: 18px 18px 4px 18px;
    font-size: 15px;
    line-height: 1.45;
    font-weight: 400;
    max-width: 100%;
  }
</style>
</head>
<body>
  <div class="bubble">Create a multi-channel campaign to reach fintech CTOs in the US</div>
</body>
</html>
