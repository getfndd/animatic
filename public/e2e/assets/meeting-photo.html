<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: oklch(35% 0.06 60);
    position: relative;
  }
  /* Simulate a warm-toned meeting scene with layered gradients */
  .scene {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 45%, oklch(55% 0.08 70 / 60%) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 60%, oklch(25% 0.04 50 / 80%) 0%, transparent 40%),
      radial-gradient(ellipse at 80% 55%, oklch(30% 0.05 55 / 70%) 0%, transparent 35%),
      linear-gradient(180deg, oklch(42% 0.08 65) 0%, oklch(32% 0.06 55) 100%);
  }
  /* Warm color grade overlay matching reference */
  .grade {
    position: absolute;
    inset: 0;
    background: oklch(70% 0.16 75 / 35%);
    mix-blend-mode: color;
  }
  /* Depth-of-field blur zones */
  .bokeh-left {
    position: absolute;
    left: -5%;
    top: 20%;
    width: 30%;
    height: 60%;
    background: oklch(40% 0.06 60 / 80%);
    filter: blur(30px);
    border-radius: 50%;
  }
  .bokeh-right {
    position: absolute;
    right: -3%;
    top: 30%;
    width: 25%;
    height: 50%;
    background: oklch(35% 0.05 55 / 70%);
    filter: blur(25px);
    border-radius: 50%;
  }
  /* Central subject glow */
  .subject {
    position: absolute;
    left: 35%;
    top: 15%;
    width: 30%;
    height: 70%;
    background: radial-gradient(ellipse, oklch(60% 0.06 75 / 50%) 0%, transparent 70%);
  }
</style>
</head>
<body>
  <div class="scene"></div>
  <div class="bokeh-left"></div>
  <div class="bokeh-right"></div>
  <div class="subject"></div>
  <div class="grade"></div>
</body>
</html>
