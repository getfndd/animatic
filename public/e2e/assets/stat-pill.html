<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 12px;
    background: oklch(97% 0.01 75 / 90%);
    padding: 16px 28px;
    border-radius: 16px;
    box-shadow:
      0 4px 20px oklch(40% 0.05 70 / 15%),
      0 0 0 1px oklch(100% 0 0 / 20%);
  }
  .send-icon {
    font-size: 22px;
    color: oklch(35% 0.02 70);
  }
  .stat-text {
    font-size: 28px;
    font-weight: 500;
    color: oklch(25% 0.02 70);
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <div class="pill">
    <span class="send-icon">▷</span>
    <span class="stat-text">569 emails sent</span>
  </div>
</body>
</html>
